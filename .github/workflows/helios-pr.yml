name: HELIOS Config Safety
on: [pull_request]

jobs:
  helios-evaluation:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run HELIOS Pipeline
        id: helios_run
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HELIOS_REASONING_MODEL: gemini-2.5-flash-lite
          HELIOS_ORACLE_MODEL: gemini-2.5-flash-lite
          PYTHONUTF8: 1
        run: |
          # For the hackathon demo, we evaluate config_a.yaml to trigger a BLOCK
          python cli/helios.py evaluate demo/config_a.yaml --local > helios_output.txt 2>&1 || exit_code=$?
          
          echo "exit_code=${exit_code:-0}" >> $GITHUB_OUTPUT
          
          # Print to the GitHub Action logs
          cat helios_output.txt
          
          # Format the output to pass to the comment step
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "report<<$EOF" >> $GITHUB_OUTPUT
          cat helios_output.txt >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT
          
      - name: Post HELIOS Report to PR
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.helios_run.outputs.report }}`;
            const body = `### 🛡️ HELIOS Config Safety Analysis\n\n\`\`\`text\n${report}\n\`\`\``;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })
            
      - name: Enforce HELIOS Verdict
        run: |
          if [ "${{ steps.helios_run.outputs.exit_code }}" -ne 0 ]; then
            echo "::error::HELIOS returned a BLOCK or STAGE verdict. This configuration is unsafe to deploy."
            exit 1
          fi
